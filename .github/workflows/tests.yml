name: Tests

on:
  pull_request:
  push:
    branches: [master]

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Compile scripts
        run: python3 -m py_compile scripts/gitradar-discover.py scripts/gitradar-score.py scripts/upstream-monitor.py tests/test_gitradar.py
